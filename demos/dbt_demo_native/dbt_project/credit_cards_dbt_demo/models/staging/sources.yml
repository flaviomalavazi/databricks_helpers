version: 2

sources:
  - name: raw
    description: "Raw landing tables produced by the Data_Generators notebooks (managed Delta tables in Unity Catalog)."
    database: "{{ var('raw_catalog') }}"
    schema: "{{ var('raw_schema') }}"
    tables:
      - name: tab_analytics_events
        description: "Web analytics events generated by 00_web_events_data_generator."
      - name: tab_sale_transactions
        description: "Credit card sale transactions generated by 01_transaction_events_generator."
      - name: tab_customer_records
        description: "Customer records generated by 02_customer_records_generator."
      - name: tab_google_ads
        description: "Google ads investment data generated by 03_media_data_generation."
      - name: tab_facebook_investment
        description: "Facebook ads investment data generated by 03_media_data_generation."
      - name: tab_bing_investment
        description: "Bing ads investment data generated by 03_media_data_generation."
      - name: tab_mailchimp_emails
        description: "Mailchimp email campaign data generated by 03_media_data_generation."
